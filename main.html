<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-up Form</title>
    <link rel="stylesheet" href="stylesheet.css">
</head>

<body>
    <div id = "left-body">
        <div id = "logo-container">
            <img id = "logo" src="odin-lined.png" alt="The Odin Project Logo">
            <p id = "name">ODIN</p>
        </div>
    </div>

    <div id="right-body">
        <div id="form-container">
            <p id="form-title">Let's Do This!</p>
            <form id="form" method="post">
                <div class = "form-row">
                    <div class = "input-container">
                        <label for="first-name">First Name</label>
                        <input type="text" id="first-name" class="input-box">
                    </div>
    
                    <div class = "input-container">
                        <label for="last-name">Last Name</label>
                        <input type="text" id="last-name" class="input-box">
                    </div>
                </div>
    
                <div class = "form-row">
                    <div class = "input-container">
                        <label for="email">Email</label>
                        <input type="text" id="email" class="input-box">
                    </div>
    
                    <div class = "input-container">
                        <label for="phone">Phone Number</label>
                        <input type="text" id="phone" class="input-box">
                    </div>
                </div>
    
                <div class = "form-row">
                    <div class = "input-container">
                        <label for="password">Password</label>
                        <input type="text" id="password" class="input-box">
                    </div>
    
                    <div class = "input-container">
                        <label for="pass-confirm">Re-Type Password</label>
                        <input type="text" id="pass-confirm" class="input-box">
                    </div>
                </div>
            </form>
            <div id="btn-container">
                <button id="create-acc-btn">Create Account</button>
                <div id="log-in-container">
                    <p>Already have an account? <a id = "log-in" href="#">Log in</a></p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
